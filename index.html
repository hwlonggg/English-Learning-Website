<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <title>Tiếng Anh 9 | Ôn Thi Vào 10</title>
    <style>
        /* ================= THEME VARIABLES (ENGLISH ORANGE EDITION) ================= */
        :root {
            --bg-color: #fffaf5; 
            --header-bg: rgba(255, 255, 255, 0.9);
            --primary-orange: #f97316; 
            --soft-orange: #ffedd5;
            --card-bg: #ffffff;
            --text-dark: #431407;
            --text-light: #9a3412;
            --accent-english: #ea580c; 
            --border: #fed7aa;
        }

        [data-theme="dark"] {
            --bg-color: #1c1917; 
            --header-bg: rgba(28, 25, 23, 0.95);
            --primary-orange: #fb923c;
            --soft-orange: #431407;
            --card-bg: #292524;
            --text-dark: #ffedd5;
            --text-light: #fdba74;
            --accent-english: #f97316;
            --border: #78350f;
        }

        /* ================= GENERAL SETUP ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(var(--soft-orange) 1px, transparent 1px),
                              linear-gradient(90deg, var(--soft-orange) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-dark);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
        }

        header {
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--header-bg);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--primary-orange);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-orange);
            display: flex;
            align-items: center;
            gap: 14px;
            font-family: 'Georgia', serif;
        }

        .logo-img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 12px;
            background: white;
            padding: 4px;
            border: 2px solid var(--primary-orange);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .theme-switch {
            background: var(--soft-orange);
            border: 2px solid var(--primary-orange);
            color: var(--accent-english);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
            white-space: nowrap;
        }

        .theme-switch:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        /* ================= HERO & SEARCH ================= */
        .hero { padding: 40px 5% 20px; text-align: center; }
        .hero h1 { font-size: 2.8rem; color: var(--primary-orange); margin-bottom: 10px; font-family: 'Georgia', serif; }
        
        .search-container { max-width: 600px; margin: 20px auto; }
        .search-box {
            width: 100%; padding: 15px 25px; border: 2px solid var(--border);
            border-radius: 12px; background: var(--card-bg); color: var(--text-dark); outline: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* ================= CARDS GRID ================= */
        main { padding: 10px 5% 80px; max-width: 1200px; margin: 0 auto; }
        .cards-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        .math-card {
            text-decoration: none; color: inherit; background: var(--card-bg);
            border-radius: 15px; padding: 25px; border: 1px solid var(--border);
            display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }

        .math-card::before {
            content: "A"; position: absolute; right: -5px; top: -15px; font-size: 5rem;
            color: var(--soft-orange); opacity: 0.4; font-weight: bold; font-family: serif;
        }

        .math-card:hover { 
            transform: translateY(-8px); 
            border-color: var(--primary-orange); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
        }

        .card-emoji { font-size: 2.2rem; margin-bottom: 15px; z-index: 1; }
        .card-title { font-size: 1.05rem; font-weight: 700; color: var(--accent-english); margin-bottom: 10px; z-index: 1; }
        .card-desc { font-size: 0.9rem; color: var(--text-light); margin-bottom: 15px; flex-grow: 1; z-index: 1; }
        .card-meta { font-size: 0.85rem; font-weight: 600; color: var(--primary-orange); border-top: 1px dashed var(--border); padding-top: 12px; z-index: 1; }

        footer { text-align: center; padding: 40px 20px; background: var(--header-bg); border-top: 1px solid var(--border); }
        .author { color: var(--primary-orange); font-weight: 800; font-size: 1.1rem; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="images/logo.png?v=2" alt="Logo English" class="logo-img">
        <span>Tiếng Anh 9 - Luyện Thi</span>
    </div>

    <div class="header-actions">
        <a href="https://forms.gle/3EFuhxNX2c9X64mt5" target="_blank" class="theme-switch">
            <span>⚠️</span>
            <span>Báo Lỗi</span>
        </a>

        <button class="theme-switch" id="theme-toggle">
            <span id="theme-icon">🌙</span>
            <span id="theme-text">Chế độ tối</span>
        </button>
    </div>
</header>

    <section class="hero">
        <h1>Tiếng Anh 9 - Ôn Thi Vào 10 🎯</h1>
        <div class="search-container">
            <input type="text" class="search-box" id="search-input" placeholder="Tìm kiếm trong tài liệu tiếng Anh... 🔍">
        </div>
    </section>

    <main>
        <div class="cards-grid" id="cards-container"></div>
    </main>

    <footer>
        <p>Hệ thống lưu trữ tài liệu ôn tập Tiếng Anh 9 & Luyện thi vào 10 ✍️</p>
        <span class="author">Created by Nguyễn Hoàng Long 🔥</span>
    </footer>

    <script>
        const cardData = [
            { emoji: "📘", title: "Sách iLearn Smart World 9", url: "https://drive.google.com/file/d/1_rDAhfirLOZdxaonWfp2L3DuyGKiHa_K/view", desc: "Sách giáo khoa Tiếng Anh 9 iLearn Smart World - Chương trình mới." },
            { emoji: "📝", title: "Tự Học Tiếng Anh 9", url: "https://drive.google.com/file/d/1lW6nIZb2s0-6s7rHMNg_vwhPBV58P1tL/view", desc: "Tài liệu tự học, củng cố ngữ pháp và từ vựng Tiếng Anh lớp 9." },
            { emoji: "🖋️", title: "Tự Học Tiếng Anh 9 (Ver2)", url: "https://drive.google.com/file/d/15r-Q1m1QzWRLGycvM51HXnpsuQ5JZAXi/view", desc: "Phiên bản bổ sung các dạng bài tập tự luyện nâng cao." },
            { emoji: "🎧", title: "Các Đề GHK1 Tiếng Anh 9", url: "https://vndethi.com/chuyen-muc/de-thi-giua-ki-1-tieng-anh-9/", desc: "Tổng hợp bộ đề thi giữa học kỳ 1 bám sát chương trình." },
            { emoji: "📖", title: "Các Đề CHK1 Tiếng Anh 9", url: "https://vndethi.com/chuyen-muc/de-thi-cuoi-ki-1-tieng-anh-9/", desc: "Bộ đề thi cuối học kỳ 1 chọn lọc từ các trường." },
            { emoji: "✍️", title: "Các Đề GHK2 Tiếng Anh 9", url: "https://vndethi.com/chuyen-muc/de-thi-giua-ki-2-tieng-anh-9/", desc: "Đề ôn tập giữa học kỳ 2 giúp nắm vững kiến thức trọng tâm." },
            { emoji: "💬", title: "Các Đề CHK2 Tiếng Anh 9 (Ver1)", url: "https://vndethi.com/chuyen-muc/de-thi-cuoi-ki-2-tieng-anh-9/", desc: "Bộ đề thi cuối học kỳ 2 từ các sở GD&ĐT." },
            { emoji: "📁", title: "Các Đề CHK2 Tiếng Anh 9 (Ver2)", url: "https://drive.google.com/drive/folders/1Kljje8LprKfGuoRXooYgmjc62tJsy8sE", desc: "Kho tài liệu đề thi học kỳ 2 bổ trợ và tham khảo thêm." },
            { emoji: "🎓", title: "50 Đề Minh Hoạ Vào 10", url: "https://drive.google.com/file/d/1SNmPCi7DaK5NL0-ye9wLl4Cu18pMzOMr/view?fbclid=IwY2xjawRwI1NleHRuA2FlbQIxMABicmlkETFsS0NkVE5NZEc4VHowbW1Ec3J0YwZhcHBfaWQQMjIyMDM5MTc4ODIwMDg5MgABHqR4I4du3ouCmIo7YEjUdpsQHLOkzA88VdEriRlwtszw_XKdQ1gMAFL0wbCJ_aem_xJADgKSvZ1mKffdqgK8eJw", desc: "50 đề minh hoạ luyện thi tuyển sinh lớp 10 cực kỳ chất lượng." }
        ];

        const container = document.getElementById('cards-container');
        cardData.forEach(data => {
            const card = document.createElement('a');
            card.href = data.url;
            card.target = "_blank";
            card.className = "math-card";
            card.innerHTML = `
                <span class="card-emoji">${data.emoji}</span>
                <div class="card-title">${data.title}</div>
                <div class="card-desc">${data.desc}</div>
                <div class="card-meta">Học ngay ➜</div>
            `;
            container.appendChild(card);
        });

        // Theme Toggle Logic
        const toggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        toggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.innerText = '🌙';
                themeText.innerText = 'Chế độ tối';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.innerText = '☀️';
                themeText.innerText = 'Chế độ sáng';
            }
        });

        // Search Logic
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.math-card').forEach(card => {
                card.style.display = card.textContent.toLowerCase().includes(term) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
